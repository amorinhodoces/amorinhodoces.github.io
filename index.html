<!DOCTYPE html>
<html lang="en">
<head>

  <!-- Page Information
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
  <meta charset="utf-8">
  <title>LittleLink Amorinho Doces</title>
  <!-- <meta name="description" content="https://littlelink.io"> -->
  <!-- <meta name="author" content="Seth Cottle"> -->

  <!-- Mobile Specific Metas
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- CSS
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
  <link rel="stylesheet" href="css/normalize.css">
    <!-- Themes:
            Auto:   css/skeleton-auto.css
            Light:  css/skeleton-light.css
            Dark:   css/skeleton-dark.css
     -->
    <link rel="stylesheet" href="css/skeleton-light.css">
    <!-- Brand Styles -->
    <link rel="stylesheet" href="css/brands.css">

    <style>
      body{
        margin: 0;
        padding: 0;
        background-image: url("images/fundos.jpeg");
        background-size: cover; /* Ajusta o tamanho da imagem para cobrir todo o fundo */
        background-position: center; /* Centraliza a imagem no fundo */
        background-repeat: no-repeat; /* Evita a repetição da imagem */
        height: 100vh; /* Garante que o fundo cubra toda a altura da viewport */
        color: #ffffff; /* Define a cor do texto para melhor legibilidade */
        font-family: Arial, sans-serif; /* Define a fonte do texto */
      }
      .button-nega{
        width: 94%;
        background-color: #C182BD;
        display: flex; /* Torna os filhos em linha */
        align-items: center; /* Centraliza verticalmente */
        text-align: center; /* Centraliza horizontalmente */
      }

      .image{
        width: 100px;
        height: 100px;
        border-radius: 50%;
      }

      .image-top{
        width: 100%;
        max-width: 100%; /* Certifica-se de que a imagem não ultrapasse a largura do contêiner */
        height: auto; /* Mantém a proporção da imagem */
      }
      a{
        color: #fff;
      }

      .conteudo{
        margin: 0 10px;
        font-weight: 800;
      }
      h1{
        font-size: 2.4rem;
        margin-bottom: 0px;
        color: #000;
      }
      h2{
        margin-top: 0px;
        font-weight: 100;
        color:#ee91e2;
      }
    </style>
</head>

<body>

  <!-- Primary Page Layout
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
  <div class="container">
    <div class="row">
      <div class="column">
        <img class="image-top" src="images/negaTopo.jpeg" alt="">
      </div>
      <div class="column" style="margin-top: 10%">
        <p>
          <h1>Tabata Souza</h1>
          <h2>Confeiteira</h2>
        </p>

        <a class="button button-nega" href="https://api.whatsapp.com/send?phone=5511913664998" target="_blank" rel="noopener" role="button">
          <div class="conteudo"><img class="image" src="images/whatsapp.png" alt=""></div>
          <div class="conteudo">Dúvidas, Orçamentos e Encomendas</div>
        </a>
        <br>

        <a class="button button-nega" href="https://www.youtube.com/@bytabatasouza" target="_blank" rel="noopener" role="button">
          <div class="conteudo"><img class="image" src="images/negaYouTube.jpeg" alt=""></div>
          <div class="conteudo">by Tabata Souza | Youtube</div>
        </a>
        <br>
      
        <br>
      </div>
    </div>
  </div>
</body>
</html>
